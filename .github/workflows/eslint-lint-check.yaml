name: ESlint Lint Check

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: ""
      eslint-version:
        required: false
        type: string
        default: ""
      check-path:
        required: false
        type: string
        default: "."
      cache-dependency-manager:
        required: false
        type: string
        default: "npm"

jobs:
  lint:
    name: ESlint Lint Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: bymbly/gha-workflows/.github/actions/setup-node@76ed0a7b32360f977ed5cc38d50a89aec1c623b0 # main
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache-dependency-manager }}

      - name: Install Dependencies
        run: npm ci

      - name: Run ESlint
        run: npx --yes eslint${{ inputs.eslint-version && format('@{0}', inputs.eslint-version) || '' }} ${{ inputs.check-path }}
