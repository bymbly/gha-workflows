name: ESlint Lint Check

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: ""
      eslint-version:
        required: false
        type: string
        default: ""
      check-path:
        required: false
        type: string
        default: "."
      cache-dependency-manager:
        required: false
        type: string
        default: "npm"

jobs:
  lint:
    name: ESlint Lint Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Setup Node.js
        uses: bymbly/gha-workflows/.github/actions/setup-node@c4ca1c44a7bee41f92c26fc720c17e5d1c4c3f9a # main
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache-dependency-manager }}

      - name: Install Dependencies
        run: npm ci

      - name: Run ESlint
        run: npx --yes eslint${{ inputs.eslint-version && format('@{0}', inputs.eslint-version) || '' }} ${{ inputs.check-path }}
