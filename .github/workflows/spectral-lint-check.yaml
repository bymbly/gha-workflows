name: Spectral Lint Check

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: ""
      spectral-version:
        required: false
        type: string
        default: ""
      file-glob:
        required: false
        type: string
        default: "./{openapi,asyncapi,arazzo}/*.{json,yml,yaml}"
      cache-dependency-manager:
        required: false
        type: string
        default: "npm"

jobs:
  lint:
    name: Spectral Lint Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Setup Node.js
        uses: bymbly/gha-workflows/.github/actions/setup-node@c4ca1c44a7bee41f92c26fc720c17e5d1c4c3f9a # main
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache-dependency-manager }}

      - name: Install Dependencies
        run: npm ci

      - name: Lint Check
        run: npx --yes @stoplight/spectral-cli${{ inputs.spectral-version && format('@{0}', inputs.spectral-version) || '' }} lint --fail-severity warn ${{ inputs.file-glob }}
