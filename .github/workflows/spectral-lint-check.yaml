name: Spectral Lint Check

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: ""
      spectral-version:
        required: false
        type: string
        default: ""
      file-glob:
        required: false
        type: string
        default: "./{openapi,asyncapi,arazzo}/*.{json,yml,yaml}"
      cache-dependency-manager:
        required: false
        type: string
        default: "npm"

jobs:
  lint:
    name: Spectral Lint Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: bymbly/gha-workflows/.github/actions/setup-node@844fe5900d92e1673d94fdfee39edafcb4a7cc09 # main
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache-dependency-manager }}

      - name: Install Dependencies
        run: npm ci

      - name: Lint Check
        run: npx --yes @stoplight/spectral-cli${{ inputs.spectral-version && format('@{0}', inputs.spectral-version) || '' }} lint --fail-severity warn ${{ inputs.file-glob }}
