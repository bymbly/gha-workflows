name: Prettier Format Check

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: ""
      prettier-version:
        required: false
        type: string
        default: ""
      check-path:
        required: false
        type: string
        default: "."
      cache-dependency-manager:
        required: false
        type: string
        default: "npm"

jobs:
  format:
    name: Prettier Format Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Setup Node.js
        uses: bymbly/gha-workflows/.github/actions/setup-node@5d2041d3e4b52225eb9366d5e201f6d0a2b89269 # main
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache-dependency-manager }}

      - name: Install Dependencies
        run: npm ci

      - name: Check Formatting
        run: npx --yes prettier${{ inputs.prettier-version && format('@{0}', inputs.prettier-version) || '' }} --check ${{ inputs.check-path }}
