name: Prettier Format Check

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: ""
      prettier-version:
        required: false
        type: string
        default: ""
      check-path:
        required: false
        type: string
        default: "."
      cache-dependency-manager:
        required: false
        type: string
        default: "npm"

jobs:
  format:
    name: Prettier Format Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: bymbly/gha-workflows/.github/actions/setup-node@07b9fd1e25457554a9c11e956ef3047162a7e09c # main
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache-dependency-manager }}

      - name: Install Dependencies
        run: npm ci

      - name: Check Formatting
        run: npx --yes prettier${{ inputs.prettier-version && format('@{0}', inputs.prettier-version) || '' }} --check ${{ inputs.check-path }}
