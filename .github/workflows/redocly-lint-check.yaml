name: Redocly Lint Check

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: ""
      redocly-version:
        required: false
        type: string
        default: ""
      apis:
        # by default, lint all apis specified in redocly.yaml
        required: false
        type: string
      cache-dependency-manager:
        required: false
        type: string
        default: "npm"

jobs:
  lint:
    name: Redocly Lint Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: bymbly/gha-workflows/.github/actions/setup-node@695fc8cd052fa358192e0b4d2f18105969d53c2c # main
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache-dependency-manager }}

      - name: Install Dependencies
        run: npm ci

      - name: Lint Check
        run: npx --yes @redocly/cli${{ inputs.redocly-version && format('@{0}', inputs.redocly-version) || '' }} lint ${{ inputs.apis }}
