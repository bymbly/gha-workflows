name: Redocly Lint Check

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: ""
      redocly-version:
        required: false
        type: string
        default: ""
      apis:
        # by default, lint all apis specified in redocly.yaml
        required: false
        type: string
      cache-dependency-manager:
        required: false
        type: string
        default: "npm"

jobs:
  lint:
    name: Redocly Lint Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: bymbly/gha-workflows/.github/actions/setup-node@5ebf55c233a1d7d269bc032240edb6b6737e467d # main
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache-dependency-manager }}

      - name: Install Dependencies
        run: npm ci

      - name: Lint Check
        run: npx --yes @redocly/cli${{ inputs.redocly-version && format('@{0}', inputs.redocly-version) || '' }} lint ${{ inputs.apis }}
